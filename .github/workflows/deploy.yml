name: Kittygram CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_frontend
  IMAGE_GATEWAY: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_gateway

jobs:
  backend_lint_and_tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: kittygram
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kittygram_user -d kittygram"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8

      - name: Check backend with flake8
        run: flake8 backend

      - name: Run backend tests
        env:
          POSTGRES_DB: kittygram
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          SECRET_KEY: test-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: "*"
        run: pytest -q

  frontend_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false

  build_and_push:
    runs-on: ubuntu-latest
    needs:
      - backend_lint_and_tests
      - frontend_tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.IMAGE_GATEWAY }}:latest
            ${{ env.IMAGE_GATEWAY }}:${{ github.sha }}

  get_infra_outputs:
    runs-on: ubuntu-latest
    needs: build_and_push

    outputs:
      host: ${{ steps.terraform_outputs.outputs.host }}
      url: ${{ steps.terraform_outputs.outputs.url }}

    defaults:
      run:
        working-directory: ./infra

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"

      TF_VAR_yc_token: ${{ secrets.YC_TOKEN }}
      TF_VAR_yc_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_yc_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_yc_zone: ${{ secrets.YC_ZONE }}
      TF_VAR_storage_access_key: ${{ secrets.YC_STORAGE_ACCESS_KEY }}
      TF_VAR_storage_secret_key: ${{ secrets.YC_STORAGE_SECRET_KEY }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_vm_user: ${{ secrets.VM_USER }}
      TF_VAR_app_bucket_name: ${{ secrets.APP_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.YC_TFSTATE_BUCKET }}" \
            -backend-config="access_key=${{ secrets.YC_STORAGE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.YC_STORAGE_SECRET_KEY }}"

      - name: Read Terraform outputs
        id: terraform_outputs
        run: |
          echo "host=$(terraform output -raw external_ip)" >> "$GITHUB_OUTPUT"
          echo "url=$(terraform output -raw kittygram_url)" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: get_infra_outputs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          HOST: ${{ needs.get_infra_outputs.outputs.host }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Copy compose file to server
        env:
          HOST: ${{ needs.get_infra_outputs.outputs.host }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          scp docker-compose.production.yml "$VM_USER@$HOST:/opt/kittygram/docker-compose.production.yml"

      - name: Create production env file
        env:
          HOST: ${{ needs.get_infra_outputs.outputs.host }}
          VM_USER: ${{ secrets.VM_USER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          ssh "$VM_USER@$HOST" "cat > /opt/kittygram/.env" << EOF
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          DB_HOST=postgres
          DB_PORT=5432
          SECRET_KEY=$DJANGO_SECRET_KEY
          DEBUG=False
          ALLOWED_HOSTS=$HOST,localhost,127.0.0.1
          DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
          EOF

      - name: Deploy Kittygram
        env:
          HOST: ${{ needs.get_infra_outputs.outputs.host }}
          VM_USER: ${{ secrets.VM_USER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          ssh "$VM_USER@$HOST" << EOF
          set -e

          cd /opt/kittygram

          echo "$DOCKERHUB_PASSWORD" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          sudo docker compose -f docker-compose.production.yml pull
          sudo docker compose -f docker-compose.production.yml up -d
          sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate --noinput
          sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --noinput
          sudo docker compose -f docker-compose.production.yml ps
          EOF

  post_deploy_tests:
    runs-on: ubuntu-latest
    needs:
      - deploy
      - get_infra_outputs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyyaml requests

      - name: Run post-deploy tests
        env:
          KITTYGRAM_DOMAIN: ${{ needs.get_infra_outputs.outputs.url }}
        run: pytest -q tests

  notify:
    runs-on: ubuntu-latest
    needs:
      - post_deploy_tests
      - get_infra_outputs
    if: success()

    steps:
      - name: Notify Telegram
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_TO }}" \
            -d text="Kittygram deployed successfully: ${{ needs.get_infra_outputs.outputs.url }}"
